version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "gomod"
    directory: "/tools/hcp-egress-policy"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "gomod"
    directory: "/tools/hcp-node-autoscaling"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "gomod"
    directory: "/tools/serving-node-metrics"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
